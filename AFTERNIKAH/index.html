<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dokumen Bayu Dan Aisyah</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            display: block;
            padding: 12px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }
        a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

	<div class="container" id="loginBox" align="center">
		<h3>Masukkan Password</h3>
		<input type="password" id="password" placeholder="Password">
		<br>
		<button style="margin-top:40px;" onclick="checkPassword()">Masuk</button>
		<p id="error" style="color:red;"></p>
	</div>

	<div class="container" id="content" style="display:none">
		<h2>Dokumen List</h2>
		<ul>
			<li><a href="./akte%20bayu.jpg">AKTE KELAHIRAN BAYU</a></li>
			<li><a href="./akte%20aisyah.pdf">AKTE KELAHIRAN AISYAH</a></li>
			<li><a href="./Buku%20Nikah.pdf">BUKU NIKAH</a></li>
			<li><a href="./Kartu%20Nikah.pdf">KARTU NIKAH</a></li>
			<li><a href="./KK.pdf">KARTU KELUARGA</a></li>
			<li><a href="./ktp-bayu.jpg">KTP BAYU</a></li>
			<li><a href="./ktp-aisyah.jpg">KTP AISYAH</a></li>
		</ul>
	</div>

	<script>
		const correctPassword = "05042026";

		function checkPassword() {
			const input = document.getElementById("password").value;

			if (input === correctPassword) {
				document.getElementById("loginBox").style.display = "none";
				document.getElementById("content").style.display = "block";
			} else {
				alert("Password salah!");
				document.getElementById("loginBox").style.display = "none";
				document.getElementById("content").style.display = "none";
				document.body.innerHTML = "<h2>Akses ditolak</h2>";
			}
		}
	</script>
</body>
</html>
