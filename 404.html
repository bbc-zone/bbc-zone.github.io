<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | BBC-Zone</title>
  <meta name="description" content="Halaman tidak ditemukan di BBC-Zone.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#101820">
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
  <link rel="canonical" href="https://bbc-zone.github.io/404.html">
  <meta http-equiv="refresh" content="8; url=/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <main class="not-found-page">
    <div class="not-found-bg"></div>
    <div class="container position-relative">
      <div class="row min-vh-100 align-items-center justify-content-center text-center">
        <div class="col-lg-7 col-xl-6">
          <a class="navbar-brand not-found-brand fw-bold" href="/">BBC<span>-Zone</span></a>
          <p class="eyebrow mb-3 mt-5">404 Not Found</p>
          <h1 class="display-4 fw-bold mb-4">Halaman yang kamu cari tidak ditemukan.</h1>
          <p class="lead mb-4">Mungkin alamatnya berubah, salah ketik, atau halaman sudah dipindahkan. Kamu akan diarahkan kembali ke homepage dalam <strong id="redirectCountdown">8</strong> detik.</p>
          <div class="d-flex flex-wrap justify-content-center gap-3">
            <a class="btn btn-brand btn-lg" href="/"><i class="bi bi-house-door me-2"></i>Kembali ke Home</a>
            <a class="btn btn-outline-light btn-lg" href="/portofolio/"><i class="bi bi-folder2-open me-2"></i>Lihat Portofolio</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var seconds = 8;
      var countdown = document.getElementById("redirectCountdown");

      var timer = window.setInterval(function () {
        seconds -= 1;
        if (countdown) {
          countdown.textContent = seconds;
        }

        if (seconds <= 0) {
          window.clearInterval(timer);
          window.location.replace("/");
        }
      }, 1000);
    })();
  </script>
</body>
</html>
